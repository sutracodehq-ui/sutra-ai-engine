<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SutraAI | Developer Documentation</title>
    <!-- Marked.js for MD rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Mermaid.js for Diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <!-- Prism.js for Syntax Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --text: #c9d1d9;
            --accent: #2f81f7;
            --border: #30363d;
            --pre-bg: #161b22;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        #content {
            max-width: 900px;
            width: 100%;
        }
        h1, h2, h3 { border-bottom: 1px solid var(--border); padding-bottom: 10px; color: #fff; }
        a { color: var(--accent); text-decoration: none; }
        pre { background: var(--pre-bg); padding: 16px; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); }
        code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 85%; }
        .mermaid { background: white; padding: 20px; border-radius: 8px; margin: 20px 0; }
        hr { border: 0; border-top: 1px solid var(--border); margin: 40px 0; }
        blockquote { border-left: 4px solid var(--accent); padding-left: 20px; color: #8b949e; margin: 0; }
    </style>
</head>
<body>
    <div id="content">Loading documentation...</div>

    <script>
        // Init Mermaid
        mermaid.initialize({ startOnLoad: false, theme: 'default' });

        async function loadDocs() {
            const response = await fetch('/docs/static/developer_docs.md');
            const markdown = await response.text();
            
            // Render MD
            document.getElementById('content').innerHTML = marked.parse(markdown);
            
            // Highlight Code
            Prism.highlightAll();

            // Render Mermaid
            const mermaidDivs = document.querySelectorAll('.language-mermaid');
            mermaidDivs.forEach((div, i) => {
                const id = 'mermaid-' + i;
                const content = div.textContent;
                const parent = div.parentElement;
                
                const mDiv = document.createElement('div');
                mDiv.className = 'mermaid';
                mDiv.textContent = content;
                
                parent.replaceWith(mDiv);
            });
            
            await mermaid.run();
        }

        loadDocs();
    </script>
</body>
</html>
