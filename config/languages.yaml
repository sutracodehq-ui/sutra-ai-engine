# ─── SutraAI Engine — Supported Languages ───────────────────
# Config-driven multilingual support.
# The engine detects input language and responds in the same language.
# Add new languages by adding entries here — zero code changes.

default_language: "en"
auto_detect: true  # Auto-detect user's language and respond in it

# System instruction injected into every agent when a language is specified
language_instruction: |
  CRITICAL LANGUAGE RULE: The user is communicating in {language_name} ({language_code}).
  You MUST respond entirely in {language_name} using the {script_name} script.
  Maintain all formatting (JSON keys stay in English, but values/content must be in {language_name}).
  If the user mixes languages (code-switching), follow their pattern naturally.
  Use culturally appropriate expressions and idioms for {language_name} speakers.

# Auto-detect instruction (when no language is explicitly set)
auto_detect_instruction: |
  LANGUAGE AWARENESS: Detect the language of the user's message and respond in the SAME language.
  If the user writes in Hindi, respond in Hindi. If Maithili, respond in Maithili.
  If mixing languages (e.g., Hinglish), mirror their style naturally.
  Keep JSON keys in English but provide content/values in the detected language.

