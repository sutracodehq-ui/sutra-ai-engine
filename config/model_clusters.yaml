# ─── Router Model ─────────────────────────────────────────────
# Tiny model for intent classification + agent routing
router:
  base_model: "qwen2.5:0.5b"
  fine_tuned_model: "sutra-router:latest"
  quantization: "Q4_K_M"
  description: "Intent classification and multi-agent task decomposition"
  max_tokens: 256
  temperature: 0.1

# ─── Training Configuration Per Cluster ───────────────────────
training_defaults:
  lora_rank: 8
  lora_alpha: 16
  learning_rate: 0.0002
  epochs: 3
  batch_size: 4
  max_seq_length: 2048
  warmup_ratio: 0.1
  min_examples: 2            # Reduced for testing
  retrain_threshold: 50      # Cloud-wins before auto-retrain

# ─── Distillation Teacher Models Per Domain ───────────────────
distillation_teachers:
  marketing:
    primary: "groq"          # Free, good at creative content
    fallback: "gemini"
  finance:
    primary: "anthropic"     # Best at structured JSON, risk analysis
    fallback: "groq"
  edtech:
    primary: "gemini"        # Good at educational content
    fallback: "groq"
  health:
    primary: "gemini"        # Knowledge breadth
    fallback: "anthropic"
  legal:
    primary: "anthropic"     # Precision, safety
    fallback: "gemini"
  ecommerce:
    primary: "groq"          # Cost-effective
    fallback: "gemini"
  coding:
    primary: "anthropic"     # Best code quality
    fallback: "groq"
  general:
    primary: "groq"          # Free tier, good enough
    fallback: "gemini"

# ─── A/B Testing Configuration ────────────────────────────────
ab_testing:
  enabled: false             # Enable after first cluster is trained
  split_ratio: 0.5           # 50/50 traffic split
  min_samples: 100           # Min samples before auto-promote
  auto_promote_threshold: 0.5  # New model must be >= 0.5 points better
  metrics:
    - schema_compliance
    - response_quality
    - latency_ms

# ─── Regression Thresholds ────────────────────────────────────
regression:
  max_score_drop: 1.0        # Block deploy if any agent drops > 1.0 point
  min_schema_compliance: 0.8  # 80% of responses must have all required fields
  max_latency_increase_pct: 50
