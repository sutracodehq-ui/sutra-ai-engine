# ─── Model Cluster Configuration ──────────────────────────────
# Maps 192 agents into domain clusters, each served by one fine-tuned model.
# This avoids per-agent model proliferation and keeps Ollama memory usage sane.
#
# On Apple Silicon (16-32 GB unified memory):
#   - Router model (~300 MB) stays loaded permanently
#   - 1-2 domain models (~2 GB each Q4) loaded on demand
#   - Ollama OLLAMA_MAX_LOADED_MODELS=3 recommended

# ─── Cluster Definitions ─────────────────────────────────────
