# ─── SutraAI Engine — OpenAPI / Swagger Configuration ───────────
# This file drives the Swagger docs at /docs and /redoc.
# Edit this file to update API documentation without touching code.
#
# ⚠️ Tag ORDER controls the section order in Swagger UI.
# Grouped logically: System → Admin → Core AI → Capabilities → Data

title: "SutraAI Engine"
summary: "AI-Powered Software Factory for Digital Marketing"
version: "1.0.0"

contact:
  name: "SutraCode"
  url: "https://sutracode.com"
  email: "support@sutracode.com"

license:
  name: "Proprietary"

description: |
  ## 🧠 SutraAI Engine — Software Factory API

  The SutraAI Engine is a **self-learning AI microservice** that powers intelligent digital marketing tools.

  ### Architecture
  - **5-Layer Intelligence Kernel**: Perception → Memory → Reasoning → Execution → Learning
  - **192+ Specialized AI Agents**: Each agent inherits the full kernel and applies it to a specific domain
  - **Self-Learning Pipeline**: Every interaction makes the engine smarter via OPRO meta-prompts, A/B testing, and anomaly detection

  ### Authentication
  Most endpoints require an API key in the `Authorization` header:
  ```
  Authorization: Bearer <your-api-key>
  ```

  **Exceptions (no auth):** `GET /health`, `GET /ready`, `GET /health/full`, and `GET /metrics` — for probes and observability.

  **Admin endpoints** (tenant/key management) require the **Master API Key**.
  **All other endpoints** require a tenant API key (`sk_live_*` or `sk_test_*`).

  ### Quick Start
  ```bash
  # 1. Create a tenant (admin)
  curl -X POST http://localhost:8090/v1/tenants \
    -H "Authorization: Bearer <MASTER_KEY>" \
    -d '{"name": "My App", "slug": "my-app"}'

  # 2. Use the returned API key to run agents
  curl -X POST http://localhost:8090/v1/agents/copywriter/run \
    -H "Authorization: Bearer sk_live_xxx" \
    -d '{"prompt": "Write a headline for our SaaS product"}'
  ```

# ─── Tag Definitions (ORDER = Swagger section order) ──────────
# Grouped: 🔧 System → 🔐 Admin → 🤖 Core AI → 🛠️ Capabilities → 📊 Data

tags:
  # ─── 🔧 System ──────────────────────────────────────────
  - name: "health"
    description: |
      **System health & metrics** — Public endpoints (no `Authorization` header).

      | Method | Path | Purpose |
      |--------|------|---------|
      | `GET` | `/health` | **Liveness** — process up; no DB/Redis I/O. Use for Kubernetes liveness. |
      | `GET` | `/ready` | **Readiness** — PostgreSQL, Redis, Alembic, active tenants; Qdrant + driver summary (informational). `503` if critical checks fail. |
      | `GET` | `/health/full` | **Deep health** — all readiness checks plus LLM provider `/v1/models` (or equivalent), Ollama tags vs configured models, CPU/load/process memory, admission limits, circuit breakers, queue stats. `503` if DB/Redis/migrations fail. |
      | `GET` | `/metrics` | **Metrics JSON** — same rich snapshot as deep health for dashboards/scrapers; always `200` with full body. |

      Responses are **not** wrapped in the global `{ success, data }` envelope (same as `/health` and `/ready`).

  # ─── 🔐 Admin & Auth ────────────────────────────────────
  - name: "tenants"
    description: >
      **Tenant Management** — Register consuming products, view/update tenant config.
      All endpoints require the **Master API Key**.

  - name: "api-keys"
    description: >
      **API Key Management** — Create, list, revoke, and rotate API keys per tenant.
      Supports multiple keys with labels, expiry, and scopes.
      All endpoints require the **Master API Key**.

  - name: "provisioning"
    description: >
      **Cross-Service Provisioning** — Atomic setup endpoints for Sutra-Identity integration.
      Creates tenants with associated voice profiles in a single transaction.

  # ─── 🤖 Core AI ─────────────────────────────────────────
  - name: "agents"
    description: >
      **AI Agent Hub** — Run any of the 192+ specialized AI agents.
      Each agent inherits the full intelligence kernel (sentiment, memory, reasoning, learning)
      and applies it to a specific domain. Use `GET /agents` to list all available agents,
      `POST /agents/{type}/run` to execute one, or `POST /agents/batch` to run multiple in parallel.

  - name: "chat"
    description: >
      **Conversational AI** — Multi-turn chat with context-aware, streaming-capable responses.
      Supports conversation history, RAG knowledge retrieval, and voice profiles.

  - name: "intelligence"
    description: >
      **Intelligence Services** — Direct access to the engine's intelligence layer:
      sentiment analysis, language detection, URL scanning, SEO audits,
      hashtag suggestions, competitor analysis, and brand profiling.

  # ─── 🛠️ Capabilities ────────────────────────────────────
  - name: "content"
    description: >
      **Content Generation** — Structured endpoints for marketing content:
      social posts, email templates, ad copy with A/B variants,
      content repurposing, calendar suggestions, and landing page copy.

  - name: "voice"
    description: >
      **Voice Pipeline** — Accept voice messages in 30+ Indian languages, auto-detect language,
      transcribe using Whisper, process through any agent, and respond with TTS.

  - name: "url-analyzer"
    description: >
      **Digital Footprint Scanner** — Full SEO, tech stack, social profile, structured data,
      security header, and Google indexing audits for any URL.

  - name: "click-shield"
    description: >
      **Click Fraud Protection** — Real-time ad click scoring, fraud detection,
      and self-learning anomaly models. Includes human feedback for model refinement.

  - name: "rag"
    description: >
      **Knowledge Base (RAG)** — Upload, manage, and query documents for
      Retrieval-Augmented Generation. Powers context-aware responses across all agents.

  # ─── 📊 Data & History ──────────────────────────────────
  - name: "conversations"
    description: >
      **Conversation History** — Create, retrieve, and manage multi-turn conversation threads.

  - name: "tasks"
    description: >
      **Task Tracking** — Track async agent task execution, status, and results.

  - name: "billing"
    description: >
      **Usage & Billing** — Token consumption tracking, plan limits, and usage reports per tenant.
