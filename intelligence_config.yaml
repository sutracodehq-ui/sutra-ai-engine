      gujarati: "gu-IN-DhwaniNeural"
      bengali: "bn-IN-TanishaaNeural"
      urdu: "ur-PK-UzmaNeural"
    metadata:
      nova: { name: "Neerja (Female, Indian Accent)", lang: "en-IN" }
      alloy: { name: "Prabhat (Male, Indian Accent)", lang: "en-IN" }
      swara: { name: "Swara (Female, Hindi Native)", lang: "hi-IN" }
      madhur: { name: "Madhur (Male, Hindi Native)", lang: "hi-IN" }
      echo: { name: "Guy (Male, American Accent)", lang: "en-US" }
      fable: { name: "Sonia (Female, British Accent)", lang: "en-GB" }
      onyx: { name: "Christopher (Male, Deep American)", lang: "en-US" }
      shimmer: { name: "Jenny (Female, American Accent)", lang: "en-US" }
      tamil: { name: "Pallavi (Tamil)", lang: "ta-IN" }
      telugu: { name: "Shruti (Telugu)", lang: "te-IN" }
      kannada: { name: "Sapna (Kannada)", lang: "kn-IN" }
      malayalam: { name: "Sobhana (Malayalam)", lang: "ml-IN" }
      marathi: { name: "Aarohi (Marathi)", lang: "mr-IN" }
      gujarati: { name: "Dhwani (Gujarati)", lang: "gu-IN" }
      bengali: { name: "Tanishaa (Bengali)", lang: "bn-IN" }
