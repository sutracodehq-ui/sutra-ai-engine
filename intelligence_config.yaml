      greeting: "Hello. I am Sutra, your intelligent companion. Welcome to the SutraCode AI Engine. What shall we build together today?"
      speed: 1.05                # slightly faster for that AI-snappiness

# ─── Budget & Cost Configuration ───────────────────────────
budget:
  default_monthly_tokens: 1000000
  redis_ttl_days: 60
  model_costs:
    gpt-4o:
      input: 0.0025
      output: 0.010
    gpt-4o-mini:
      input: 0.00015
      output: 0.0006
    claude-sonnet-4-20250514:
      input: 0.003
      output: 0.015
    gemini-2.5-pro-preview-06-05:
      input: 0.00125
      output: 0.010
    gemini-2.0-flash:
      input: 0.0001
      output: 0.0004
    llama-3.3-70b-versatile:
      input: 0.00059
      output: 0.00079
  fallback_cost:
    input: 0.001
    output: 0.002
  forecast_defaults:
    input_multiplier: 1.3
    default_output_tokens: 500
    default_model: gpt-4o-mini

# ─── Fallback Models ───────────────────────────────────────
fallback_models:
  local: "qwen2.5:3b"
  meta_optimizer: llama-3.3-70b-versatile

# ─── Timeouts (seconds) ───────────────────────────────────
timeouts:
  driver_http_s: 120
  moderation_s: 5
  escalation_s: 30
  web_search_s: 10
  web_fetch_s: 3
  queue_acquire_s: 2

# ─── Sentiment Analysis ───────────────────────────────────
sentiment:
  positive_words: [good, great, awesome, happy, thanks, love, perfect]
  negative_words: [bad, wrong, broken, slow, hate, error, fail]
