# ─── Agent → Tool Mapping ──────────────────────────────────
# Which agents get which built-in tools
agent_tools:
  seo: [calculator, keyword_extractor, text_analyzer, get_datetime]
  content_grader: [text_analyzer, keyword_extractor]
  budget_optimizer: [calculator, get_datetime]
  roi_calculator: [calculator]
  pricing_strategist: [calculator]
  performance_reporter: [calculator, get_datetime]
  campaign_strategist: [calculator, get_datetime, keyword_extractor]
  copywriter: [text_analyzer, keyword_extractor]
  social_media: [text_analyzer, get_datetime, keyword_extractor]
  email_campaign: [text_analyzer, get_datetime]
  quiz_generator: [calculator]
  note_generator: [text_analyzer, keyword_extractor]
  stock_analyzer: [calculator, get_datetime]
  stock_predictor: [calculator, get_datetime]
  market_trend_analyzer: [calculator, get_datetime]
  crypto_analyzer: [calculator, get_datetime]

# ─── Agent Chain Configs ───────────────────────────────────
# Agents that get a review step after primary execution
agent_chains:
  seo:
    type: review
    reviewer_prompt: |
      You are a senior SEO reviewer. Evaluate this SEO analysis for:
      1. Are all fields complete and properly formatted as JSON?
      2. Are the keyword suggestions relevant and specific (not generic)?
      3. Is the meta title under 60 chars and meta description under 160 chars?
      4. Are content suggestions actionable?
      If GOOD: {"approved": true, "score": 8-10}
      If needs work: {"approved": false, "score": 1-7, "feedback": "..."}

  campaign_strategist:
    type: review
    reviewer_prompt: |
      You are a senior marketing strategist. Review this campaign strategy for:
      1. Is the target audience clearly defined?
      2. Are the channels and budget allocation realistic?
      3. Are KPIs measurable and time-bound?
      4. Is the timeline feasible?
      If GOOD: {"approved": true, "score": 8-10}
      If needs work: {"approved": false, "score": 1-7, "feedback": "..."}

  competitor_analyst:
    type: review
    reviewer_prompt: |
      You are a competitive intelligence expert. Review this analysis for:
      1. Are competitor strengths/weaknesses specific?
      2. Are actionable recommendations provided?
      3. Is the data structured properly?
      If GOOD: {"approved": true, "score": 8-10}
      If needs work: {"approved": false, "score": 1-7, "feedback": "..."}

  quiz_generator:
    type: review
    reviewer_prompt: |
      You are an assessment quality expert. Review these quiz questions for:
      1. Are all question types present (MCQ, T/F, fill-blank, short answer)?
      2. Are MCQ distractors plausible?
      3. Does every answer have an explanation?
      4. Is difficulty mix balanced (40/40/20)?
      If GOOD: {"approved": true, "score": 8-10}
      If needs work: {"approved": false, "score": 1-7, "feedback": "..."}

  stock_analyzer:
    type: review
    reviewer_prompt: |
      You are a senior financial analyst. Review this stock analysis for:
      1. Are technical indicators properly calculated?
      2. Is the risk assessment quantified?
      3. Are price targets realistic with proper rationale?
      If GOOD: {"approved": true, "score": 8-10}
      If needs work: {"approved": false, "score": 1-7, "feedback": "..."}

# ─── Prompt Engine ─────────────────────────────────────────
prompt_engine:
  min_trials_for_promotion: 10
  promotion_margin: 0.5
  min_win_rate: 60.0
  retirement_trials_multiplier: 2
  retirement_win_rate_threshold: 30.0

# ─── Distillation ─────────────────────────────────────────
distillation:
  sample_topics:
    - photosynthesis
    - machine learning basics
    - world war 2
    - digital marketing
    - python programming
    - climate change
    - human anatomy
    - blockchain technology
    - artificial intelligence
    - quantum computing
    - data science
    - web development
    - social media marketing
    - content strategy
    - email marketing campaigns
    - brand positioning
    - competitive analysis for startups
    - customer retention
    - e-commerce optimization
    - influencer marketing strategy

  prompt_templates:
    edtech:
      - "Generate a quiz from these notes on {topic}"
      - "Create flashcards for the chapter on {topic}"
      - "Summarize the key points of {topic} for revision"
      - "Plan a 45-minute lecture on {topic} for undergraduate students"
      - "Extract the most important concepts from this text about {topic}"
    finance:
      - "Analyze the stock performance of {topic}"
      - "Predict the market trend for {topic} sector"
      - "Generate a risk assessment report for investing in {topic}"
      - "Create a portfolio allocation strategy including {topic}"
    marketing:
      - "Create a social media strategy for {topic}"
      - "Write a marketing campaign brief for {topic}"
      - "Generate SEO-optimized content about {topic}"
      - "Design an email campaign for {topic}"
    default:
      - "Create professional content about {topic}"
      - "Analyze and provide recommendations for {topic}"
      - "Generate a detailed report on {topic}"
      - "Write a comprehensive strategy for {topic}"
      - "Provide expert advice on {topic}"

# ─── Response Cache ────────────────────────────────────────
response_cache:
  enabled: true
  default_ttl: 3600               # 1 hour default
  min_response_length: 50         # Don't cache very short responses

  # Per-agent TTL overrides (seconds)
  agent_ttl:
    stock_analyzer: 300           # 5 min — stock data changes fast
    stock_predictor: 300
    crypto_analyzer: 300
    market_trend_analyzer: 600    # 10 min
    ai_trend_tracker: 7200        # 2 hours — trends don't change fast
    seo: 3600                     # 1 hour
    copywriter: 1800              # 30 min — creative content varies
    quiz_generator: 7200          # 2 hours
    note_generator: 7200

# ─── LoRA Training ─────────────────────────────────────────
lora_training:
  min_examples_for_training: 20   # Skip training if fewer examples
  min_response_length: 50         # Min chars for valid training example
  max_examples_in_modelfile: 20   # Max examples baked into Modelfile
  error_patterns:                 # Filter out error responses
    - "error"
    - "failed"
    - "sorry, i can't"
    - "i'm unable to"
    - "as an ai"
    - "i cannot"

# ─── Evolution Engine ──────────────────────────────────────
evolution_engine:
  # Model families to check for updates in Ollama
  tracked_model_families:
    - "qwen2.5:3b"
    - "qwen2.5:7b"
    - "llama3.2:3b"
    - "llama3.1:8b"
    - "mistral:7b"
    - "gemma2:2b"
    - "gemma2:9b"
    - "phi3:mini"
    - "deepseek-r1:7b"

  # Specific models to benchmark against current
  candidate_models:
    - "qwen2.5:3b"
    - "qwen2.5:7b"
    - "llama3.2:3b"
    - "gemma2:2b"

  # Upgrade thresholds
  min_quality_improvement: 0.5   # Minimum quality score improvement to upgrade
  max_latency_increase_pct: 50   # Max % latency increase allowed for upgrade

  # Benchmark test prompts
  benchmark_prompts:
    - prompt: "Explain photosynthesis in 3 sentences."
      expected_keywords: [sunlight, carbon dioxide, oxygen, chlorophyll]
      max_tokens: 200
    - prompt: "Write a JSON object with keys: name, age, city for a fictional person."
      expected_keywords: [name, age, city]
      max_tokens: 100
      format_check: json
    - prompt: "List 5 marketing strategies for a SaaS startup. Return as JSON array."
      expected_keywords: [content, social, email, seo]
      max_tokens: 500
      format_check: json
    - prompt: "Calculate the ROI if I invest $10,000 and get back $15,000 after 2 years."
      expected_keywords: ["50%", ROI, return]
      max_tokens: 200
    - prompt: "Write a professional product description for a wireless noise-cancelling headphone."
      expected_keywords: [noise, battery, comfort, sound, wireless]
      max_tokens: 300
    - prompt: "Create a SWOT analysis for a food delivery startup in JSON format."
      expected_keywords: [strengths, weaknesses, opportunities, threats]
      max_tokens: 400
      format_check: json

  # Self-teaching prompts (diverse domains for broad learning)
  self_teaching_prompts:
    - "Explain the concept of supply and demand in economics"
    - "Write a professional email asking for a meeting next week"
    - "Create a Python function that validates email addresses"
    - "Generate a SWOT analysis template for a tech startup"
    - "Describe the process of machine learning model training"
    - "Write a product description for a smart water bottle"
    - "Explain blockchain technology to a 10-year-old"
    - "Create a weekly meal plan for a vegetarian diet"
    - "Analyze the pros and cons of remote work"
    - "Write a cover letter for a software engineering position"
    - "Generate 5 social media post ideas for a coffee brand"
    - "Explain the difference between SQL and NoSQL databases"
    - "Write a press release for a new AI product launch"
    - "Create a risk assessment for a cryptocurrency investment"
    - "Summarize the key principles of agile project management"
