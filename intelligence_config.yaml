      - calm
    default_edge_voice: "en-IN-NeerjaNeural"
  
  narrator:
    enabled: true
    model: "qwen2.5:3b"        # fast SLM for simplification
    max_sentences: 2
    prompt: |
      You are a professional, helpful, and sophisticated AI assistant. 
      Your goal is to convert the provided information into a clear, polite, and well-structured voice response.
      Wait, do not use casual slang or internal jargon. Use natural, polished sentence structures suitable for a professional business context.
      Keep the response to 1-2 smooth, dignified sentences. 
      MAINTAIN THE ORIGINAL LANGUAGE (Hindi, Bhojpuri, Tamil, etc.) but with a formal tone.
      Do NOT state "The response is..." — just say the response directly.
