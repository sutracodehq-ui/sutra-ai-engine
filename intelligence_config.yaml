# ─── Intelligence Module Configuration ──────────────────────
# All configurable constants for the AI intelligence pipeline.
# Never hardcode these in Python — edit this file instead.

# ─── Load Balancer (per-driver concurrency limits) ──────────
load_balancer:
  driver_limits:
    ollama: 2          # CPU-bound — matches OLLAMA_NUM_PARALLEL
    groq: 20           # Cloud API — high concurrency
    sarvam: 10         # Cloud API
    openai: 20         # Cloud API
    anthropic: 10      # Cloud API
    gemini: 20         # Cloud API
    nvidia: 10         # Cloud API
    bitnet: 5          # Local 1-bit service

# ─── Provider Metadata (Base URLs & Models) ────────────────
providers:
  openai:
    base_url: "https://api.openai.com/v1"
  groq:
    base_url: "https://api.groq.com/openai/v1"
  nvidia:
    base_url: "https://integrate.api.nvidia.com/v1"
  sarvam:
    base_url: "https://api.sarvam.ai/v1"
  bitnet:
    base_url: "http://sutra-ai-bitnet:8081/v1"
  ollama:
    base_url: "http://sutra-ai-ollama:11434/v1"

