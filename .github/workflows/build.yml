# ─────────────────────────────────────────────────────────────
# SutraAI Engine — Build & Push Images to GHCR
#
# Software Factory pattern: tags trigger the pipeline.
# No deployment — just build, tag, push.
#
# Triggers:
#   - Push tag: v* (e.g., v0.1.0, v0.2.0-beta)
#   - Manual: workflow_dispatch
#
# Images pushed:
#   - ghcr.io/sutracodehq-ui/sutra-ai-engine/api:v0.1.0
#   - ghcr.io/sutracodehq-ui/sutra-ai-engine/api:latest
#   - ghcr.io/sutracodehq-ui/sutra-ai-engine/worker:v0.1.0
#   - ghcr.io/sutracodehq-ui/sutra-ai-engine/worker:latest
# ─────────────────────────────────────────────────────────────

name: Build & Push to GHCR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g., v0.1.0). Defaults to 'dev'."
        required: false
        default: "dev"

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  # ─── Build API Image ─────────────────────────────────────
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/api
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ─── Build Worker Image ──────────────────────────────────
  build-worker:
    name: Build Worker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/worker
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ─── Summary ─────────────────────────────────────────────
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-api, build-worker]
    steps:
      - name: Print image tags
        run: |
          echo "✅ Images pushed to GHCR:"
          echo "  API:    ${{ env.IMAGE_BASE }}/api"
          echo "  Worker: ${{ env.IMAGE_BASE }}/worker"
          echo ""
          echo "Pull with:"
          echo "  docker pull ${{ env.IMAGE_BASE }}/api:latest"
          echo "  docker pull ${{ env.IMAGE_BASE }}/worker:latest"
