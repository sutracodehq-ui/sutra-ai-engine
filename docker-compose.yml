# Compose v2 — works with Docker (`docker compose`) and Podman (`podman compose`).
# Rootless Podman: use `podman compose up -d --build`; service DNS names match Docker Compose.
services:
  # ─── API Server (FastAPI + Uvicorn) ─────────────────────
  sutra-ai-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sutra-ai-api
    entrypoint: ["./docker/entrypoint.sh"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8090:8000"
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./agent_config:/app/agent_config
      - ./config:/app/config
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
      - ./docker/entrypoint.sh:/app/docker/entrypoint.sh
      - ./docs:/app/docs
      - ./intelligence_config.yaml:/app/intelligence_config.yaml
      - sutra_home:/home/sutra        # shared app cache (e.g. embeddings temp)
      - training_data:/app/training    # chat logs, training data
    depends_on:
      sutra-ai-postgres:
        condition: service_healthy
      sutra-ai-redis:
        condition: service_healthy
      sutra-ai-qdrant:
        condition: service_healthy
    networks:
      - sutra-ai-network
    restart: unless-stopped

  # ─── Celery Worker (Queue Processing) ──────────────────
  sutra-ai-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sutra-ai-worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      - SKIP_READY_CHECK=true
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./agent_config:/app/agent_config
      - ./config:/app/config
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
      - ./docs:/app/docs
      - ./intelligence_config.yaml:/app/intelligence_config.yaml
      - sutra_home:/home/sutra        # shared app cache (e.g. embeddings temp)
      - training_data:/app/training    # chat logs, training data
    depends_on:
      sutra-ai-postgres:
        condition: service_healthy
      sutra-ai-redis:
        condition: service_healthy
      sutra-ai-qdrant:
        condition: service_healthy
    networks:
      - sutra-ai-network
    restart: unless-stopped

  # ─── Celery Beat (Cron Scheduler) ──────────────────────
  sutra-ai-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sutra-ai-beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      - SKIP_READY_CHECK=true
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./agent_config:/app/agent_config
      - ./config:/app/config
      - ./scripts:/app/scripts
    depends_on:
      sutra-ai-redis:
        condition: service_healthy
    networks:
      - sutra-ai-network
    restart: unless-stopped

  # ─── PostgreSQL ────────────────────────────────────────
  sutra-ai-postgres:
    image: postgres:16-alpine
    container_name: sutra-ai-postgres
    environment:
      POSTGRES_DB: sutra_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sutra-ai-network
    restart: unless-stopped

  # ─── Redis ────────────────────────────────────────────
  sutra-ai-redis:
    image: redis:7-alpine
    container_name: sutra-ai-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sutra-ai-network
    restart: unless-stopped


  # ─── Ollama (Local LLM) ──────────────────────────────
  sutra-ai-ollama:
    image: ollama/ollama:latest
    container_name: sutra-ai-ollama
    environment:
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_KEEP_ALIVE=24h
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - sutra-ai-network
    restart: unless-stopped

  # ─── Ollama Model Puller (config-driven, auto-pulls missing models) ─
  sutra-ai-ollama-init:
    image: ollama/ollama:latest
    container_name: sutra-ai-ollama-init
    environment:
      - OLLAMA_HOST=http://sutra-ai-ollama:11434
      - CONFIG_FILE=/app/config/ollama_models.yaml
    volumes:
      - ./scripts/ollama_init.sh:/app/scripts/ollama_init.sh:ro
      - ./config/ollama_models.yaml:/app/config/ollama_models.yaml:ro
    entrypoint: ["/bin/sh", "/app/scripts/ollama_init.sh"]
    depends_on:
      sutra-ai-ollama:
        condition: service_healthy
    networks:
      - sutra-ai-network
    restart: "no"


  # ─── BitNet (1-bit Ultra-Light LLM) ────────────────────
  sutra-ai-bitnet:
    build:
      context: .
      dockerfile: docker/Dockerfile.bitnet
    container_name: sutra-ai-bitnet
    ports:
      - "8081:8081"
    volumes:
      - bitnet_models:/opt/bitnet/models
    environment:
      BITNET_MODEL: /opt/bitnet/models/BitNet-b1.58-2B-4T.gguf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sutra-ai-network
    restart: unless-stopped

  # ─── Adminer (DB Management UI) ───────────────────────
  sutra-ai-adminer:
    image: adminer:latest
    container_name: sutra-ai-adminer
    ports:
      - "8091:8080"
    environment:
      ADMINER_DEFAULT_SERVER: sutra-ai-postgres
      ADMINER_DESIGN: nette
    depends_on:
      sutra-ai-postgres:
        condition: service_healthy
    networks:
      - sutra-ai-network
    restart: unless-stopped

  # ─── Qdrant (Vector DB for agent memory / RAG) ───────
  # Official image is Debian-based with bash; TCP check avoids needing curl/wget in slim images.
  sutra-ai-qdrant:
    image: qdrant/qdrant:latest
    container_name: sutra-ai-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - sutra-ai-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
  bitnet_models:
  sutra_home:          # /home/sutra — shared app cache
  training_data:       # /app/training — chat logs, escalations, training data

networks:
  sutra-ai-network:
    driver: bridge
