services:
  # ─── API Server (FastAPI + Uvicorn) ─────────────────────
  sutra-ai-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sutra-ai-api
    entrypoint: ["./docker/entrypoint.sh"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8090:8000"
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./agent_config:/app/agent_config
      - ./config:/app/config
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
      - ./docker/entrypoint.sh:/app/docker/entrypoint.sh
      - ./docs:/app/docs
      - ./intelligence_config.yaml:/app/intelligence_config.yaml
      - sutra_home:/home/sutra        # ChromaDB embedding cache
      - training_data:/app/training    # chat logs, training data
    depends_on:
      sutra-ai-postgres:
        condition: service_healthy
      sutra-ai-redis:
        condition: service_healthy
    networks:
      - sutra-ai-network
      - marketing-network
    restart: unless-stopped

  # ─── Celery Worker (Queue Processing) ──────────────────
  sutra-ai-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sutra-ai-worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      - SKIP_READY_CHECK=true
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./agent_config:/app/agent_config
      - ./config:/app/config
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
      - ./docs:/app/docs
      - ./intelligence_config.yaml:/app/intelligence_config.yaml
      - sutra_home:/home/sutra        # ChromaDB embedding cache
      - training_data:/app/training    # chat logs, training data
    depends_on:
      sutra-ai-postgres:
        condition: service_healthy
      sutra-ai-redis:
        condition: service_healthy
    networks:
      - sutra-ai-network
    restart: unless-stopped

  # ─── Celery Beat (Cron Scheduler) ──────────────────────
  sutra-ai-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sutra-ai-beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      - SKIP_READY_CHECK=true
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./agent_config:/app/agent_config
      - ./config:/app/config
      - ./scripts:/app/scripts
    depends_on:
      sutra-ai-redis:
        condition: service_healthy
    networks:
      - sutra-ai-network
    restart: unless-stopped

  # ─── PostgreSQL ────────────────────────────────────────
  sutra-ai-postgres:
    image: postgres:16-alpine
    container_name: sutra-ai-postgres
    environment:
      POSTGRES_DB: sutra_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sutra-ai-network
    restart: unless-stopped

  # ─── Redis ────────────────────────────────────────────
  sutra-ai-redis:
    image: redis:7-alpine
    container_name: sutra-ai-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sutra-ai-network
    restart: unless-stopped

  # ─── ChromaDB (Vector Store) ──────────────────────────
  sutra-ai-chromadb:
    image: chromadb/chroma:latest
    container_name: sutra-ai-chromadb
    ports:
      - "8100:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
    networks:
      - sutra-ai-network
    restart: unless-stopped

  # ─── Ollama (Local LLM) ──────────────────────────────
  sutra-ai-ollama:
    image: ollama/ollama:latest
    container_name: sutra-ai-ollama
    environment:
      - OLLAMA_NUM_PARALLEL=2  # software-level parallelism: 2 concurrent inference slots
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - sutra-ai-network
    restart: unless-stopped

  # ─── Ollama Model Puller (runs once, pulls qwen2.5:3b) ─
  sutra-ai-ollama-init:
    image: ollama/ollama:latest
    container_name: sutra-ai-ollama-init
    environment:
      - OLLAMA_HOST=http://sutra-ai-ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Ollama server..."
        sleep 5
        echo "Pulling qwen2.5:3b..."
        ollama pull qwen2.5:3b
        echo "Model qwen2.5:3b ready!"
    depends_on:
      sutra-ai-ollama:
        condition: service_healthy
    networks:
      - sutra-ai-network
    restart: "no"


  # ─── Adminer (DB Management UI) ───────────────────────
  sutra-ai-adminer:
    image: adminer:latest
    container_name: sutra-ai-adminer
    ports:
      - "8091:8080"
    environment:
      ADMINER_DEFAULT_SERVER: sutra-ai-postgres
      ADMINER_DESIGN: nette
    depends_on:
      sutra-ai-postgres:
        condition: service_healthy
    networks:
      - sutra-ai-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chromadb_data:
  ollama_data:
  sutra_home:          # /home/sutra — ChromaDB embedding cache
  training_data:       # /app/training — chat logs, escalations, training data

networks:
  sutra-ai-network:
    driver: bridge
  marketing-network:
    external: true
    name: digital-mankerting-tool_marketing-network
