# ─── SutraCode AI Engine — Product Catalog ──────────────────
# 
# 149 agents divided into 12 separate products.
# Each product can be deployed independently or as part of the full engine.
# 
# Usage: 
#   product_registry.get_product("tryambaka_marketing").agents → list of agent IDs
#   product_registry.get_product("kisan_ai").agents → agriculture agents
#
# Why separate products?
# 1. Each product gets its own panel/dashboard
# 2. Billing per product (not per agent)
# 3. Customers buy what they need (a farmer doesn't need e-commerce agents)
# 4. Scale independently — deploy only the products you need

